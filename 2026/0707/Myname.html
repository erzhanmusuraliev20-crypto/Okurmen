<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        @keyframes myanimation {
            0% {
                background-color: red;
                border-radius: 25%;
                rotate: 0deg;
                left: 0;
            }

            50% {
                background-color: green;
                border-radius: 50%;
                left: 300px;

            }

            75% {
                left: 100px;
            }

            100% {
                background-color: blue;
                border-radius: 25%;
                rotate: 360deg;
                left: 0;
            }
        }

        .animation {
            border: 1px solid black;
            height: 50px;
            width: 50px;
            animation-name: myanimation;
            animation-duration: 5s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            position: relative;
        }

        h1 {
            width: 40px;
        }

        @keyframes r-animation {
            0% {
                background-color: blue;
            }

            100% {
                background-color: red;
            }
        }

        .r {
            animation-name: r-animation;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes j-animation {
            0% {
                border-radius: 0%;
            }

            100% {
                border-radius: 50%;
            }
        }

        .j {
            border: 1px solid green;
            animation-name: j-animation;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes a-animation {
            0% {
                rotate: 0deg;
            }

            100% {
                rotate: 360deg;
            }
        }

        .a {
            animation-name: a-animation;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes n-animation {
            0% {
                font-size: small;
            }

            100% {
                font-size: xx-large;
            }
        }

        .n {
            /* animation-name: n-animation;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
            animation-delay: 1s;
            animation-direction: alternate-reverse; */
            animation: n-animation 1s infinite linear 1s alternate-reverse;
        }
    </style>
</head>

<body>
    <h1 class="animation">Э</h1>
    <h1 class="r">Р</h1>
    <h1 class="j">Ж</h1>
    <h1 class="a">А</h1>
    <h1 class="n">Н</h1>
</body>

</html>
