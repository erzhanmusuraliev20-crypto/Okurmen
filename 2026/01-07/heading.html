<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; 
            color: red;
            background-color: rgb(0, 255, 255);
        }
        .first:hover {
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: greenyellow; background-color: darkviolet;
        }
        .second:hover {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; color: rgb(255, 255, 255); background-color: rgb(8, 0, 255);
        }
        .third:hover {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: rgb(255, 247, 0); background-color: rgb(255, 0, 0);
        }
        .fourth:hover { 
        font-family: 'Times New Roman', Times, serif; color: rgb(255, 200, 0); background-color: rgb(0, 0, 0);
        }
        .fifth:hover {
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif; color: darkblue; background-color: rgb(255, 72, 72);
        }
        .sixth:hover { 
        font-family: Arial, Helvetica, sans-serif; color: rgb(255, 255, 0);background-color: rgb(3, 186, 64);
        }

    </style>
</head>
<body>
  <h1>Hello <span class="first"> World! </span></h1>  
  <h2>my name is <span class="second"> Erjan </span> </h2>
  <h3>I live in <span class="third"> Kyrgyzstan </span> </h3>
  <h4>I like <span class="fourth"> basketball </span> </h4>
  <h5>I have <span class="fifth"> laptop </span></h5>
  <h6>My favorite color is <span class="sixth"> orange </span> </h6>
</body>    
</html>
