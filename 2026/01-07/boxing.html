<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div { 
            background-color:
             rgb(0, 40, 113);
             width: 50px;
             height: 50px;
             border: 1px
             solid rgb(255, 255, 255)

        }
        .top-right {
            background-color: rgb(255, 0, 0);
            position: fixed;
            top: 0;
            right: 0;
        }
        .top-left {
            background-color: aqua;
            position: fixed;
            top: 0;
            left: 0;
        }
        .special {
            background-color: darkorange;
            position: fixed;
            bottom: 0;
            left: 0;
        }
        .bottom-right {
            background-color: lime;
            position: fixed;
            bottom: 0;
            right: 0;
        }
        .relative:hover {
            background-color: rgb(0, 40, 113);
            position: relative;
            left: 500px;
        }
        .absolute {
            position: absolute;
            width: 400px;
            height: 300px;
            left: 50px;
            top: 50px;
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="absolute"></div>
    <div class="special"></div>
    <div class="top-left"></div>
    <div class="top-right"></div>
    <div class="bottom-right"></div>
    <div class="relative"></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</body>
</html>
